<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date Invite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Would you like to go out on a date with me?</h1>
        <p>Choose carefully 😉</p>

        <div class="buttons">
            <button id="yesBtn" class="yes">Yes 😄</button>
            <button id="noBtn" class="no">No 🙄</button>
        </div>
    </div>

    <!-- Video Overlay -->
    <div id="videoOverlay" class="video-overlay">
        <div class="video-box">
            <video id="popupVideo" width="100%" controls>
                <source src="your-video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
